# fly.toml - Fly.io Configuration
# Run: fly launch to initialize

app = "my-project-api"
primary_region = "fra"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "docker/production/Dockerfile"

[env]
  APP_ENV = "prod"
  APP_DEBUG = "0"
  LOG_CHANNEL = "stderr"

[experimental]
  auto_rollback = true

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    restart_limit = 0
    timeout = "2s"

  [[services.http_checks]]
    interval = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    restart_limit = 0
    timeout = "2s"
    tls_skip_verify = false

[[statics]]
  guest_path = "/app/public/assets"
  url_prefix = "/assets/"

[mounts]
  source = "app_storage"
  destination = "/app/var"

# Scaling configuration
[processes]
  app = "frankenphp run --config /etc/caddy/Caddyfile"
  worker = "php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M -vv"

# Deploy hook - run migrations
[deploy]
  release_command = "php bin/console doctrine:migrations:migrate --no-interaction"

# Machine sizing
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
