# render.yaml
# Render Blueprint - Auto-creates all services

services:
  # ===========================================
  # BACKEND API
  # ===========================================
  - type: web
    name: api
    runtime: docker
    repo: https://github.com/YOUR_USER/YOUR_REPO
    dockerfilePath: ./docker/production/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: starter
    branch: main
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: APP_DEBUG
        value: "0"
      - key: APP_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cache
          type: redis
          property: connectionString
      - key: MESSENGER_TRANSPORT_DSN
        fromService:
          name: cache
          type: redis
          property: connectionString
      - key: CORS_ALLOW_ORIGIN
        value: "^https://.*\\.onrender\\.com$"

  # ===========================================
  # FRONTEND (Static Site)
  # ===========================================
  - type: web
    name: frontend
    runtime: static
    repo: https://github.com/YOUR_USER/YOUR_REPO
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ===========================================
  # WORKER (Background Jobs)
  # ===========================================
  - type: worker
    name: worker
    runtime: docker
    repo: https://github.com/YOUR_USER/YOUR_REPO
    dockerfilePath: ./docker/production/Dockerfile.worker
    dockerContext: ./backend
    region: frankfurt
    plan: starter
    branch: main
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cache
          type: redis
          property: connectionString
      - key: MESSENGER_TRANSPORT_DSN
        fromService:
          name: cache
          type: redis
          property: connectionString

# ===========================================
# DATABASES
# ===========================================
databases:
  - name: db
    plan: starter
    databaseName: app
    user: app
    region: frankfurt
    postgresMajorVersion: "16"
    ipAllowList: []

# ===========================================
# REDIS
# ===========================================
  - name: cache
    plan: starter
    region: frankfurt
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
