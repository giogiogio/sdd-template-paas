# BMAD Configuration
# Customize this file for your project

project_name: "my-project"  # CHANGE THIS
user_skill_level: intermediate
user_name: "developer"  # CHANGE THIS
communication_language: Italian
document_output_language: Italian

# Paths
output_folder: "{project-root}/_bmad-output"
planning_artifacts: "{project-root}/_bmad-output/planning-artifacts"
implementation_artifacts: "{project-root}/_bmad-output/implementation-artifacts"
project_knowledge: "{project-root}/docs"

# Workflow settings
default_mode: prototype  # prototype | production
require_human_gates: true
