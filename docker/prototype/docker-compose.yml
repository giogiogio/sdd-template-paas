# Docker Compose - Prototype Stack
# Minimal: FrankenPHP + PostgreSQL

services:
  # ===========================================
  # APP - FrankenPHP (Symfony + HTMX)
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-prototype}_app
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../../prototype:/app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-app_db}?serverVersion=18
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prototype_network

  # ===========================================
  # DATABASE - PostgreSQL 18
  # ===========================================
  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-prototype}_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - prototype_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prototype_network

  # ===========================================
  # ADMINER - Database UI (optional)
  # ===========================================
  adminer:
    image: adminer:latest
    container_name: ${COMPOSE_PROJECT_NAME:-prototype}_adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - prototype_network
    profiles:
      - tools

volumes:
  prototype_postgres_data:
    driver: local

networks:
  prototype_network:
    driver: bridge
