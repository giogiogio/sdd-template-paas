# Docker Compose - Local Development
# Use this for local development only - PaaS handles production

services:
  # ===========================================
  # APP - FrankenPHP (Backend API)
  # ===========================================
  app:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-app}_backend
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../../backend:/app
      - app_var:/app/var
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_DEBUG: ${APP_DEBUG:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-app_db}?serverVersion=18
      REDIS_URL: redis://redis:6379
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev_network

  # ===========================================
  # FRONTEND - Vite Dev Server
  # ===========================================
  frontend:
    image: node:22-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:${APP_PORT:-8000}
    networks:
      - dev_network

  # ===========================================
  # DATABASE - PostgreSQL
  # ===========================================
  postgres:
    image: postgres:18-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  # ===========================================
  # REDIS - Cache & Queue
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-app}_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dev_network

  # ===========================================
  # MAILPIT - Dev Email Catcher
  # ===========================================
  mailpit:
    image: axllent/mailpit:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - dev_network
    profiles:
      - tools

  # ===========================================
  # ADMINER - Database UI
  # ===========================================
  adminer:
    image: adminer:latest
    container_name: ${COMPOSE_PROJECT_NAME:-app}_adminer
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - dev_network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local
  app_var:
    driver: local

networks:
  dev_network:
    driver: bridge
